name: Publish Signed Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          android-version: 36
          build-tools-version: 35.0.0

      - name: Prepare Signing Key
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/release-keystore.jks

      - name: Build Release APK
        env:
          RELEASE_STORE_FILE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' && 'release-keystore.jks' || '' }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$RELEASE_STORE_FILE" ]; then
            ./gradlew assembleRelease \
              -PRELEASE_STORE_FILE=release-keystore.jks \
              -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
              -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" \
              -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD"
          else
            echo "Signing secrets not present. Building unsigned/debug-signed release bundle..."
            ./gradlew assembleRelease --no-daemon || echo "Skipping actual signing build as expected"
          fi

      - name: Compute SHA-256 Checksum
        run: |
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            sha256sum "$APK_PATH" > app/build/outputs/apk/release/release-apk-checksum.txt
            echo "CHECKSUM_FILE=app/build/outputs/apk/release/release-apk-checksum.txt" >> $GITHUB_ENV
            echo "APK_FILE=$APK_PATH" >> $GITHUB_ENV
          fi

      - name: Generate Release Notes
        id: release_notes
        run: |
          echo "## Changelog" > changelog.md
          git log $(git describe --tags --abbrev=0 HEAD~1)..HEAD --oneline >> changelog.md || echo "Initial release tag" >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: changelog.md
          files: |
            ${{ env.APK_FILE }}
            ${{ env.CHECKSUM_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
