name: Signed GitHub Release Workflow

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@3a47a13d04cd997173dbb814010a1f8a61d1b6db # v4.0.0
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@21cf03ef7922d9cb35b2e5ef686526e033d4538e # v3.0.0
        with:
          android-version: 36
          build-tools-version: 35.0.0

      - name: Make Harness Executable
        run: chmod +x harness.sh

      - name: Run Quality Gate Pipeline
        run: ./harness.sh verify

      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_STORE_FILE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Build Signed Release APK
        run: ./gradlew :app:assembleRelease --no-daemon
        env:
          RELEASE_STORE_FILE: release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Compute SHA-256 Checksums
        run: |
          cd app/build/outputs/apk/release/
          sha256sum app-release.apk > app-release.apk.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@c08a1c97afae2af3df9a1f89bc400b1d3d0f1b6a # v2.0.1
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/release/app-release.apk.sha256
          draft: false
          prerelease: false
          generate_release_notes: true

