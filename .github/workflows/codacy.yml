name: Codacy Static Analysis

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codacy-static-analysis:
    name: Codacy Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Codacy Analysis CLI
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          curl -fsSL https://raw.githubusercontent.com/codacy/codacy-cli/master/codacy-cli.sh -o codacy-cli.sh
          chmod +x codacy-cli.sh
          ./codacy-cli.sh analyze --output results.sarif --format sarif \
            --max-allowed-issues 2147483647 || true

      - name: Upload SARIF results
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: results.sarif
