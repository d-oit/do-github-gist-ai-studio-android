name: Reusable Build and Verify

on:
  workflow_call:
    secrets:
      CODACY_PROJECT_TOKEN:
        required: false

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build-and-verify:
    name: Build & Verify
    runs-on: ubuntu-latest
    env:
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@99b8673ff64fbf99d8d325f52d9a5bdedb8483e9 # v4.2.1
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@00854ea68c109d98c75d956347303bf7c45b0277 # v3.2.1
        with:
          android-version: 36
          build-tools-version: 35.0.0

      - name: Make Harness Executable
        run: chmod +x harness.sh

      - name: Run Quality Gate Pipeline
        run: ./harness.sh verify
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}

      - name: Generate JaCoCo Coverage Report
        run: ./harness.sh coverage

      - name: Upload Coverage to Codacy
        if: ${{ env.CODACY_PROJECT_TOKEN != '' }}
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        with:
          project-token: ${{ env.CODACY_PROJECT_TOKEN }}
          coverage-reports: app/build/reports/jacoco/jacocoTestReportDebug/jacocoTestReportDebug.xml
