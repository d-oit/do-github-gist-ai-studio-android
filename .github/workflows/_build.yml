name: Reusable Build and Verify

on:
  workflow_call:
    secrets:
      CODACY_PROJECT_TOKEN:
        required: false

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build-and-verify:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@862b4887b1c08411d35a21074e5ad1981299dad4 # v4.2.1
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@b29d499edec5ed5036f01da53556c606132714c3 # v3.2.1
        with:
          android-version: 36
          build-tools-version: 35.0.0

      - name: Make Harness Executable
        run: chmod +x harness.sh

      - name: Run Quality Gate Pipeline
        run: ./harness.sh verify
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}

      - name: Generate JaCoCo Coverage Report
        run: ./harness.sh coverage

      - name: Upload Coverage to Codacy
        if: ${{ env.HAS_CODACY_TOKEN == 'true' }}
        uses: codacy/codacy-coverage-reporter-action@89d6c5132c817bc1260ec5e012290574704b40ee # v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: app/build/reports/jacoco/jacocoTestReportDebug/jacocoTestReportDebug.xml.xml
